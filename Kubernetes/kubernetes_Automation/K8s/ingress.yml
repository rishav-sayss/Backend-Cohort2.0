apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: express-ingress
  labels: 
    app.kubernetes.io/name: express-app

spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix

            backend:
              service:
                name: main-server-service
                port:
                  number: 80